name: CI

on:
  push:
  pull_request:

jobs:
  core:
    name: Core (${{ matrix.os }})

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Continuity and Plan Authority contract
        run: npm run test:p0-continuity

      - name: Lint, unit tests and build
        run: npm run check

      - name: Goal Runtime crash recovery
        run: npm run test:e2e:goal-crash

      - name: Multi-Agent Supervisor crash recovery
        run: npm run test:e2e:supervisor-crash

      - name: Long-running Agent crash recovery
        run: npm run test:e2e:long-running-crash

      - name: Platform and Worktree crash recovery
        run: npm run test:e2e:platform-crash && npm run test:e2e:worktree-crash

      - name: Tool Runtime crash recovery matrix
        run: npm run test:e2e:runtime-crash && npm run test:e2e:runtime-write-crash

      - name: Tool Runtime performance benchmark
        run: npm run test:benchmark

  electron-smoke:
    name: Electron smoke (${{ matrix.os }})
    needs: core

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Electron preload smoke test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:electron:ci

      - name: Electron preload smoke test (Windows)
        if: runner.os == 'Windows'
        run: npm run test:electron

  electron-e2e:
    name: Electron E2E (${{ matrix.os }})
    needs: core

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Real Electron crash recovery E2E (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e:electron-runtime-crash

      - name: Real Electron crash recovery E2E (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e:electron-runtime-crash

      - name: Playwright Electron E2E (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e

      - name: Playwright Electron E2E (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e

      - name: Upload E2E failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-${{ matrix.os }}
          path: test-results/
          if-no-files-found: ignore
