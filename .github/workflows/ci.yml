name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Check
        run: npm run check

      - name: Electron preload smoke test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:electron

      - name: Electron preload smoke test (Windows)
        if: runner.os == 'Windows'
        run: npm run test:electron
